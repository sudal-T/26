<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>학생부 작성 도우미</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#f5f4f0;color:#1a1a1a;min-height:100vh;padding:2rem 1rem}
.wrap{max-width:720px;margin:0 auto}
.hd{margin-bottom:1.5rem}
.hd .tag{font-size:11px;letter-spacing:.1em;color:#0f6e56;text-transform:uppercase;font-weight:500}
.hd h1{font-size:26px;font-weight:600;margin-top:4px;color:#0a0a0a}
.card{background:#fff;border-radius:16px;border:1px solid #e8e6e0;padding:1.5rem;margin-bottom:1rem}
.card-title{font-size:13px;font-weight:600;color:#444;margin-bottom:1rem}
label{font-size:12px;color:#666;display:block;margin-bottom:7px;font-weight:500;letter-spacing:.03em}
input[type=text],textarea{width:100%;padding:10px 12px;border-radius:8px;border:1px solid #d8d6d0;font-size:14px;font-family:inherit;background:#fafaf8;color:#1a1a1a;transition:border .15s;outline:none}
input[type=text]:focus,textarea:focus{border-color:#1d9e75;background:#fff}
textarea{resize:vertical;line-height:1.7}
input[type=range]{width:100%;accent-color:var(--tc,#1d9e75);cursor:pointer;height:4px;margin:6px 0}
.tabs{display:flex;gap:4px;margin-bottom:1rem;background:#fff;border-radius:12px;border:1px solid #e8e6e0;padding:4px}
.tab-btn{flex:1;padding:9px 0;font-size:13px;font-weight:500;border:none;background:none;cursor:pointer;border-radius:9px;color:#888;transition:all .15s;font-family:inherit;white-space:nowrap}
.tab-btn.active{color:#fff}
.tab-btn:hover:not(.active){background:#f5f5f5}
.btn-primary{width:100%;padding:13px;font-size:15px;font-weight:600;color:#fff;border:none;border-radius:10px;cursor:pointer;font-family:inherit;transition:opacity .15s;background:var(--tc,#1d9e75)}
.btn-primary:hover{opacity:.88}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-secondary{padding:9px 16px;font-size:13px;border-radius:8px;border:1px solid #d8d6d0;background:#fff;cursor:pointer;font-family:inherit;color:#444;transition:all .15s;white-space:nowrap}
.btn-secondary:hover{border-color:#1d9e75;color:#0f6e56}
.btn-danger{padding:9px 16px;font-size:13px;border-radius:8px;border:1px solid #fcc;background:#fff5f5;cursor:pointer;font-family:inherit;color:#c00;transition:all .15s}
.btn-danger:hover{background:#fee}
.btn-apply{width:100%;padding:12px;font-size:14px;font-weight:600;color:#fff;border:none;border-radius:10px;cursor:pointer;font-family:inherit;transition:opacity .15s;background:#2d6a4f;margin-top:12px;display:none}
.btn-apply:hover{opacity:.88}
.loading{display:none;text-align:center;padding:2.5rem;color:#666;font-size:14px}
.spinner{width:28px;height:28px;border:2.5px solid #e8e6e0;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.result-wrap{display:none}
.result-card{background:#fff;border-radius:16px;border:1px solid #e8e6e0;padding:1.5rem;margin-bottom:1rem}
.result-card.q-card{background:#fffdf7;border-color:#f5c88a}
.result-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid #f0ede8;flex-wrap:wrap;gap:8px}
.result-title{font-size:13px;font-weight:600;color:#0a0a0a}
.char-badge{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500}
.copy-btn{padding:5px 12px;font-size:12px;border-radius:6px;border:1px solid #d8d6d0;background:#fff;cursor:pointer;font-family:inherit;color:#444;transition:all .15s}
.copy-btn:hover{border-color:#1d9e75;color:#1d9e75}
.result-body{font-size:14px;line-height:1.95;color:#1a1a1a;white-space:pre-wrap}
.competencies{margin-top:14px;padding-top:12px;border-top:1px solid #f0ede8;font-size:12px;color:#888}
.opts-sec{margin-bottom:1rem}
.opts-title{font-size:12px;color:#888;margin-bottom:8px;font-weight:500}
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.opt-action{padding:11px 14px;font-size:13px;border-radius:10px;border:1px solid #d8d6d0;background:#fff;cursor:pointer;text-align:left;font-family:inherit;color:#333;transition:all .15s}
.opt-action:hover{border-color:#1d9e75;color:#0f6e56;background:#f5fdf9}
.sub-modal{display:none;background:#f9f8f5;border:1px solid #e8e6e0;border-radius:12px;padding:1rem;margin-bottom:1rem}
.sub-label{font-size:12px;color:#666;margin-bottom:8px;font-weight:500}
.tag-btn{padding:6px 12px;font-size:12px;border-radius:20px;border:1px solid #d8d6d0;background:#fff;cursor:pointer;font-family:inherit;color:#444;transition:all .15s;margin:3px}
.tag-btn:hover{border-color:#1d9e75;color:#0f6e56}
.tag-btn.selected{background:#1d9e75;color:#fff;border-color:#1d9e75}
.err-msg{display:none;padding:12px 14px;background:#fff5f5;border:1px solid #fdd;border-radius:8px;font-size:13px;color:#c00;margin-bottom:1rem}
.save-bar{display:none;gap:8px;align-items:center;padding:12px 14px;background:#f0fdf8;border:1px solid #9fd1bf;border-radius:10px;margin-bottom:1rem;flex-wrap:wrap}
.save-bar span{font-size:13px;color:#0f6e56;flex:1}
.stu-list{display:flex;flex-direction:column;gap:6px;max-height:220px;overflow-y:auto;margin-top:8px}
.stu-item{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-radius:8px;border:1px solid #e8e6e0;background:#fafaf8;font-size:13px;cursor:pointer;transition:all .15s}
.stu-item:hover{border-color:#aaa;background:#f0fdf8}
.stu-item.active{border-color:#1d9e75;background:#e1f5ee;color:#0f6e56;font-weight:500}
.badges{display:flex;gap:3px;flex-wrap:wrap}
.badge{font-size:10px;color:#fff;padding:2px 6px;border-radius:8px;font-weight:500}
.row{display:flex;gap:8px;align-items:flex-end}
.row>*:first-child{flex:1}
.sel-bar{display:none;margin-bottom:1rem;padding:10px 12px;background:#e1f5ee;border-radius:8px;font-size:13px;color:#0f6e56;font-weight:500}
.tab-panel{display:none}
.tab-panel.active{display:block}
.dl-modal{display:none;background:#f9f8f5;border:1px solid #d8d6d0;border-radius:12px;padding:1rem;margin-top:10px}
.dl-modal textarea{height:180px;font-size:12px;background:#fff;font-family:'Courier New',monospace}
.model-badge{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:500;background:#e8f5e9;color:#2e7d32;margin-left:6px}
.w-card{background:#fffbeb;border:1.5px solid #fde68a}
/* 로그아웃 버튼 */
.logout-btn{font-size:11px;color:#bbb;background:none;border:none;cursor:pointer;padding:2px 6px;border-radius:4px;font-family:inherit}
.logout-btn:hover{color:#888;background:#eee}
@media(max-width:520px){.tabs{flex-wrap:wrap}.tab-btn{flex:calc(33% - 4px)}.opts-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <div class="hd">
    <p class="tag">고등학교 학생부</p>
    <h1>학생부 작성 도우미</h1>
  </div>

  <!-- 학생 명단 -->
  <div class="card">
    <div class="card-title">👥 학생 명단</div>
    <div style="margin-bottom:10px">
      <label>학생 이름 추가 (쉼표 또는 줄바꿈으로 구분)</label>
      <div class="row">
        <textarea id="names-input" style="height:68px" placeholder="예) 김민준, 이서연, 박지호&#10;또는 한 명씩 입력"></textarea>
        <button class="btn-secondary" onclick="addStudents()" style="height:68px;padding:0 18px">추가</button>
      </div>
    </div>
    <div id="stu-list" class="stu-list" style="display:none"></div>
    <div id="stu-select-notice" style="display:block;padding:10px 12px;background:#f0fdf8;border:1px solid #9fd1bf;border-radius:8px;font-size:13px;color:#0f6e56;margin-top:8px">
      👆 목록에서 학생을 선택해 주세요.
    </div>
    <p id="no-stu" style="font-size:13px;color:#bbb;padding:6px 0;display:none">등록된 학생이 없습니다.</p>
    <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
      <button class="btn-secondary" id="dl-txt" onclick="downloadAll('txt')" style="display:none">⬇ 전체 저장 (TXT)</button>
      <button class="btn-secondary" id="dl-csv" onclick="downloadAll('csv')" style="display:none">⬇ 전체 저장 (CSV)</button>
      <button class="btn-danger" id="clear-all" onclick="clearAll()" style="display:none">전체 초기화</button>
    </div>
    <div class="dl-modal" id="dl-modal">
      <p class="sub-label" id="dl-modal-title">저장 내용 (복사해서 사용하세요)</p>
      <textarea id="dl-content" readonly onclick="this.select()"></textarea>
      <p style="font-size:11px;color:#aaa;margin-top:6px">전체 선택 후 복사(Ctrl+C / Cmd+C)하세요.</p>
    </div>
  </div>

  <!-- 탭 -->
  <div class="tabs" id="tab-bar"></div>

  <!-- 선택 학생 표시 -->
  <div class="sel-bar" id="sel-bar">✏️ 작성 중인 학생: <span id="sel-name"></span></div>

  <!-- 탭 패널들 -->
  <div id="panels"></div>

  <div class="loading" id="loading">
    <div class="spinner" id="spinner"></div>
    <span id="loading-msg">작성하고 있습니다...</span>
  </div>

  <!-- 결과 -->
  <div class="result-wrap" id="result-wrap">
    <div class="result-card" id="result-card">
      <div class="result-hd">
        <div style="display:flex;align-items:center;flex-wrap:wrap;gap:4px">
          <span class="result-title" id="result-label"></span>
          <span class="model-badge" id="model-badge"></span>
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          <span class="char-badge" id="char-display"></span>
          <button class="copy-btn" id="copy-btn" onclick="copyResult(this)">복사</button>
        </div>
      </div>
      <div class="result-body" id="result-text"></div>
      <div class="competencies" id="competencies"></div>
    </div>

    <div id="save-bar" class="save-bar">
      <span id="save-bar-msg"></span>
      <button class="btn-secondary" id="save-btn" onclick="saveToStudent()">이 학생에 저장</button>
    </div>

    <div id="write-anyway-wrap" style="display:none;margin-bottom:1rem">
      <button id="write-anyway-btn" onclick="writeAnyway()"
        style="width:100%;padding:13px;border-radius:10px;border:none;color:#fff;font-size:14px;font-weight:600;cursor:pointer">
        ✍️ 내용이 부족하지만 바로 작성하기
      </button>
    </div>

    <div class="opts-sec" id="opts-sec">
      <p class="opts-title">수정 옵션</p>
      <div class="opts-grid">
        <button class="opt-action" onclick="toggleSub('chars-modal')">↔ 글자 수 재조정</button>
        <button class="opt-action" onclick="toggleSub('comp-modal')">★ 역량 강조</button>
        <button class="opt-action" onclick="reGenerate()">↺ 다시 작성</button>
        <button class="opt-action" onclick="toggleSub('ep-modal')">＋ 내용 추가</button>
      </div>
    </div>

    <!-- 글자 수 조정 -->
    <div class="sub-modal" id="chars-modal">
      <p class="sub-label">변경할 글자 수 선택</p>
      <label>글자 수: <strong id="adj-chars-display" style="color:#1d9e75">200자</strong></label>
      <input type="range" id="adj-chars-slider" min="100" max="500" step="50" value="200"
        oninput="onAdjCharsChange(this.value)"/>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:#aaa;margin-top:2px">
        <span>100자</span><span>200자</span><span>300자</span><span>400자</span><span>500자</span>
      </div>
    </div>

    <!-- 역량 강조 -->
    <div class="sub-modal" id="comp-modal">
      <p class="sub-label">강조할 역량을 선택하세요 (복수 선택 가능)</p>
      <div>
        <button class="tag-btn" onclick="toggleCompTag(this)">비판적 사고력</button>
        <button class="tag-btn" onclick="toggleCompTag(this)">문제해결력</button>
        <button class="tag-btn" onclick="toggleCompTag(this)">창의적 사고</button>
        <button class="tag-btn" onclick="toggleCompTag(this)">의사소통역량</button>
        <button class="tag-btn" onclick="toggleCompTag(this)">자기관리역량</button>
        <button class="tag-btn" onclick="toggleCompTag(this)">공동체역량</button>
        <button class="tag-btn" onclick="toggleCompTag(this)">정보처리역량</button>
        <button class="tag-btn" onclick="toggleCompTag(this)">탐구력</button>
        <button class="tag-btn" onclick="toggleCompTag(this)">리더십</button>
        <button class="tag-btn" onclick="toggleCompTag(this)">진로역량</button>
      </div>
    </div>

    <!-- 내용 추가 -->
    <div class="sub-modal" id="ep-modal">
      <p class="sub-label">추가할 내용을 입력하세요</p>
      <textarea id="ep-input" style="height:80px;margin-bottom:0" placeholder="추가로 반영할 에피소드나 내용을 입력하세요."
        oninput="onEpisodeChange(this.value)"></textarea>
    </div>

    <!-- 적용하기 버튼 (수정사항이 있을 때만 노출) -->
    <button class="btn-apply" id="apply-btn" onclick="applyMods()">✓ 수정사항 적용하기</button>
  </div>
</div>

<div style="text-align:center;padding:2rem 1rem 1rem;font-size:12px;color:#bbb;">
  Made by <strong style="color:#888">수달샘</strong> &middot; Powered by Claude
  &nbsp;·&nbsp;
  <button class="logout-btn" onclick="logout()">로그아웃</button>
</div>

<script>
/* ────────────────────────────────
   인증 체크 — 미인증 시 로그인 페이지로
──────────────────────────────── */
(function checkAuth() {
  if (!localStorage.getItem('hb_auth')) {
    location.href = '/login.html';
  }
})();

function logout() {
  localStorage.removeItem('hb_auth');
  location.href = '/login.html';
}

/* ────────────────────────────────
   설정값
──────────────────────────────── */
const WORKER_URL = '/api/generate';

const MODELS = {
  haiku:  'anthropic/claude-haiku-4-5',
  sonnet: 'anthropic/claude-sonnet-4-6',
};

/* ────────────────────────────────
   탭 설정
──────────────────────────────── */
const TABS = [
  { id:'se',  label:'📚 세특',   color:'#1d9e75', seLayout:true },
  { id:'ja',  label:'🏫 자율',   color:'#6366f1', placeholder:'학급 회의에서 사회자 역할 맡음, 학교 환경 캠페인 기획 주도, 학생 자치회 활동에서 의견 조율함' },
  { id:'do',  label:'🎨 동아리', color:'#ec4899', placeholder:'토론 동아리에서 반론 논리 구성, 과학 실험 동아리 팀장 역할, 발표 준비 과정에서 자료 분석 주도' },
  { id:'ji',  label:'🎯 진로',   color:'#f59e0b', placeholder:'의대 진로 탐색 활동 참여, 직업인 특강 후 진로 계획 발표, 관련 도서 읽고 심화 탐구 진행' },
  { id:'hb',  label:'📝 행발',   color:'#ef4444', placeholder:'책임감이 강하고 어려운 친구를 잘 도움, 수업 참여도 높고 발표 적극적, 학급 부반장으로 갈등 중재 역할' },
];

const LABELS = { se:'세특', ja:'자율활동', do:'동아리활동', ji:'진로활동', hb:'행발' };

/* ────────────────────────────────
   시스템 프롬프트
──────────────────────────────── */
const BASE_RULES = `
## 핵심 원칙 (가장 중요 - 반드시 준수)
- 메모 문장을 자연스럽게 다듬는 건 허용
- 메모에 없는 활동/사실 추가는 최대한 지양
- 글자 수를 채우기 위해 없는 내용을 만들지 않음. 차라리 짧게 작성하는 것이 나음

## 메모 충분성 3단계 판단
[1단계 - 작성 불가] 단어 1~3개 수준이거나 의미 불명확 → ❓ 형식으로 추가 질문
[2단계 - 내용 부족] 문장은 있지만 구체적 행동이나 결과가 전혀 없음 → ⚠️ 형식으로 경고
[3단계 - 충분] 구체적 행동이나 결과가 담긴 경우 → 바로 작성

## 기재 절대 금지 (교육부 기재요령)
공인어학시험·대회 성적·수상, 논문·도서출간, 특정 대학명·기관명·강사명,
부모 직위 암시, 자격증, 학교명·재단명, 모의고사 성적

## 금지 문장
~다짐함 / ~알게 됨 / ~라고 느낌 / ~라고 생각함 / ~에 대해 배움 / ~을 이해함
~활동지를 작성함 / ~활동에 참여함 / ~모습을 보임 / ~었음 / ~였음
"최고", "완벽한", "탁월한", "뛰어난" 등 과장 표현 금지 / 학생 간 비교 표현 금지

## 언어 사용 원칙 (교육부 기재요령 준수)
- 결과물은 반드시 한글로 작성 (숫자는 아라비아 숫자)
- 교사 메모에 영어·외국어가 있어도 결과물에는 한글로 변환
- 단, CEO, PD, IT, TV, SNS, PPT 등 통용 약어는 예외 허용
- 영어 상호명·프로그램명은 기능을 설명하는 한글 표현으로 변환
  (예: YouTube → 동영상 플랫폼, ChatGPT → 인공지능 챗봇)`;

const PROMPTS = {

  se: `당신은 고등학교 학교생활기록부 세특 작성 전문가입니다.
${BASE_RULES}

## 메모 충분성 판단
'학생 특이사항'을 기준으로 판단합니다. '수업 활동 내용'은 맥락 정보이므로 참고만 합니다.

[1단계 - 단어 1~3개 수준이거나 의미 불명확한 경우] 반드시 아래 형식으로만 응답:
❓ 더 구체적인 내용이 필요해요

작성된 메모만으로는 메모에 없는 내용을 추가하지 않고는 세특을 쓸 수 없어요.
아래 내용을 추가로 알려주시면 더 정확한 세특을 작성할 수 있어요:
1. [관찰된 구체적 활동 방법이나 과정에 대한 질문 - 과목 특성 반영]

};

/* ────────────────────────────────
   탭 전환
──────────────────────────────── */
function switchTab(id) {
  currentTab = id;
  const tc = TABS.find(t=>t.id===id).color;
  TABS.forEach(t => {
    const btn = document.getElementById('tab-btn-'+t.id);
    const active = t.id === id;
    btn.classList.toggle('active', active);
    btn.style.background = active ? t.color : '';
    document.getElementById('panel-'+t.id).classList.toggle('active', active);
  });
  document.getElementById('result-wrap').style.display='none';
  document.getElementById('spinner').style.borderTopColor = tc;
  document.getElementById('spinner').style.borderColor = tc+'33';
  ['chars-modal','comp-modal','ep-modal'].forEach(mid=>{
    document.getElementById(mid).style.display='none';
  });
  state.pendingMods = {};
  updateApplyBtn();
  state.result='';
}

/* ────────────────────────────────
   학생 명단
──────────────────────────────── */
function addStudents() {
  const raw = document.getElementById('names-input').value;
  if (!raw.trim()) return;
  raw.split(/[\n,，]+/).map(s=>s.trim()).filter(Boolean).forEach(name=>{
    if (!students.find(s=>s.name===name))
      students.push({ name, se:null, ja:null, do:null, ji:null, hb:null });
  });
  document.getElementById('names-input').value='';
  renderList();
}

function renderList() {
  const list = document.getElementById('stu-list');
  const has = students.length>0;
  list.style.display = has?'flex':'none';
  document.getElementById('no-stu').style.display = has?'none':'block';
  ['dl-txt','dl-csv','clear-all'].forEach(id=>{
    document.getElementById(id).style.display=has?'':'none';
  });
  const colors = {se:'#1d9e75',ja:'#6366f1',do:'#ec4899',ji:'#f59e0b',hb:'#ef4444'};
  list.innerHTML = students.map((s,i)=>{
    const badges = ['se','ja','do','ji','hb'].filter(t=>s[t])
      .map(t=>`<span class="badge" style="background:${colors[t]}">${LABELS[t]}</span>`).join('');
    return `<div class="stu-item ${currentStudent===i?'active':''}" onclick="selectStudent(${i})">
      <span>${s.name}</span>
      <div style="display:flex;gap:6px;align-items:center">
        <div class="badges">${badges}</div>
        <button onclick="removeStudent(event,${i})" style="background:none;border:none;cursor:pointer;color:#ccc;font-size:18px;line-height:1;padding:0 2px">×</button>
      </div>
    </div>`;
  }).join('');
}

function selectStudent(i) {
  currentStudent=i;
  document.getElementById('stu-select-notice').style.display = 'none';
  document.getElementById('sel-bar').style.display='block';
  document.getElementById('sel-name').textContent=students[i].name;
  renderList();
  if (document.getElementById('result-wrap').style.display!=='none') refreshSaveBar();
}

function removeStudent(e,i) {
  e.stopPropagation();
  if (currentStudent===i){
    currentStudent=null;
    document.getElementById('sel-bar').style.display='none';
    if (students.length > 1) document.getElementById('stu-select-notice').style.display='block';
  }
  else if (currentStudent>i) currentStudent--;
  students.splice(i,1);
  if (students.length === 0) document.getElementById('stu-select-notice').style.display='none';
  renderList();
}

function refreshSaveBar() {
  const bar = document.getElementById('save-bar');
  const isQ = document.getElementById('result-card').classList.contains('q-card');
  if (currentStudent!==null && !isQ) {
    bar.style.display='flex';
    document.getElementById('save-bar-msg').textContent=
      `${students[currentStudent].name} 학생의 ${LABELS[currentTab]}으로 저장할 수 있어요.`;
  } else {
    bar.style.display='none';
  }
}

function saveToStudent() {
  if (currentStudent===null) return;
  students[currentStudent][currentTab]=document.getElementById('result-text').textContent;
  renderList();
  const btn=document.getElementById('save-btn');
  btn.textContent='✓ 저장됨';
  setTimeout(()=>{ btn.textContent='이 학생에 저장'; },2000);
}

/* ────────────────────────────────
   다운로드
──────────────────────────────── */
function buildTxt() {
  const keys=['se','ja','do','ji','hb'];
  const names={se:'세특',ja:'자율활동',do:'동아리활동',ji:'진로활동',hb:'행발'};
  return students.filter(s=>keys.some(k=>s[k])).map(s=>{
    const parts=keys.filter(k=>s[k]).map(k=>`[${names[k]}]\n${s[k]}`);
    return `【${s.name}】\n${'─'.repeat(40)}\n${parts.join('\n\n')}`;
  }).join('\n\n'+'═'.repeat(40)+'\n\n');
}

function buildCsv() {
  const esc=v=>'"'+(v||'').replace(/"/g,'""')+'"';
  const rows=['학생명,세특,자율활동,동아리활동,진로활동,행발'];
  students.filter(s=>['se','ja','do','ji','hb'].some(k=>s[k])).forEach(s=>{
    rows.push(`"${s.name}",${esc(s.se)},${esc(s.ja)},${esc(s.do)},${esc(s.ji)},${esc(s.hb)}`);
  });
  return '\uFEFF'+rows.join('\n');
}

function downloadAll(type) {
  const saved=students.filter(s=>['se','ja','do','ji','hb'].some(k=>s[k]));
  if (!saved.length){ alert('저장된 내용이 없습니다.\n\n순서: 학생 선택 → 생성 → "이 학생에 저장" 클릭'); return; }
  const content=type==='csv'?buildCsv():buildTxt();
  const filename=type==='csv'?'학생부_전체.csv':'학생부_전체.txt';
  const mime=type==='csv'?'text/csv':'text/plain';
  try {
    const blob=new Blob([content],{type:mime+';charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),1000); return;
  } catch(e){}
  document.getElementById('dl-modal-title').textContent=`📋 ${filename} — 아래 내용을 복사해서 저장하세요`;
  document.getElementById('dl-content').value=content;
  const modal=document.getElementById('dl-modal');
  modal.style.display='block';
  modal.scrollIntoView({behavior:'smooth'});
  document.getElementById('dl-content').select();
}

function clearAll() {
  if (!confirm('학생 명단과 저장된 내용을 모두 삭제할까요?')) return;
  students=[]; currentStudent=null;
  document.getElementById('dl-modal').style.display='none';
  document.getElementById('sel-bar').style.display='none';
  document.getElementById('stu-select-notice').style.display='none';
  renderList();
  TABS.forEach(t=>resetForm(t.id));
}

/* ────────────────────────────────
   폼 초기화
──────────────────────────────── */
function resetForm(id) {
  if (id === 'se') {
    ['se-subject','se-unit','se-activity','se-memo'].forEach(fid=>{
      const el=document.getElementById(fid);
      if(el) el.value='';
    });
    const slider=document.getElementById('se-chars');
    if(slider){ slider.value=200; document.getElementById('se-chars-display').textContent='200자'; }
  } else {
    const memo=document.getElementById(id+'-memo');
    if(memo) memo.value='';
    const slider=document.getElementById(id+'-chars');
    if(slider){ slider.value=200; document.getElementById(id+'-chars-display').textContent='200자'; }
  }
  const err=document.getElementById(id+'-err');
  if(err) err.style.display='none';
  if(id===currentTab){
    document.getElementById('result-wrap').style.display='none';
    state.result='';
    state.pendingMods={};
    updateApplyBtn();
    ['chars-modal','comp-modal','ep-modal'].forEach(mid=>{
      document.getElementById(mid).style.display='none';
    });
  }
}

/* ────────────────────────────────
   입력 메시지 빌드
──────────────────────────────── */
function buildUserMsg() {
  const chars = document.getElementById(currentTab+'-chars').value;

  if (currentTab === 'se') {
    const subject  = document.getElementById('se-subject').value.trim();
    const unit     = document.getElementById('se-unit').value.trim();
    const activity = document.getElementById('se-activity').value.trim();
    const memo     = document.getElementById('se-memo').value.trim();
    let msg = `과목: ${subject || '미입력'}\n`;
    if (unit)     msg += `단원/성취기준: ${unit}\n`;
    if (activity) msg += `수업 활동 내용: ${activity}\n`;
    msg += `학생 특이사항: ${memo}\n목표 글자 수: ${chars}자`;
    return msg;
  }

  const memo = document.getElementById(currentTab+'-memo').value.trim();
  return `목표 글자 수: ${chars}자\n관찰 메모: ${memo}`;
}

/* ────────────────────────────────
   API 호출 — X-Access-Code 헤더 포함
──────────────────────────────── */
async function callAPI(messages, model, systemPrompt) {
  const authCode = localStorage.getItem('hb_auth') || '';
  const sysContent = systemPrompt !== undefined ? systemPrompt : PROMPTS[currentTab];
  let res;
  try {
    res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Access-Code': authCode
      },
      body: JSON.stringify({
        model: model,
        max_tokens: 1500,
        messages: [
          { role: 'system', content: sysContent },
          ...messages
        ]
      })
    });
  } catch(networkErr) {
    throw new Error('네트워크 오류: ' + networkErr.message);
  }

  /* 인증 만료 시 로그인 페이지로 */
  if (res.status === 401) {
    localStorage.removeItem('hb_auth');
    alert('접근 코드가 만료되었습니다. 다시 로그인해 주세요.');
    location.href = '/login.html';
    return;
  }

  let data;
  try { data = await res.json(); }
  catch(e) { throw new Error('응답 파싱 오류 (status: ' + res.status + ')'); }

  if (!res.ok || data.error) {
    const msg = data.error ? data.error.message : 'HTTP ' + res.status;
    throw new Error('API 오류: ' + msg);
  }
  if (!data.choices || !data.choices[0]) {
    throw new Error('응답 형식 오류');
  }
  return data.choices[0].message.content;
}

/* ────────────────────────────────
   생성 (Haiku - 초안)
──────────────────────────────── */
async function generate(id) {
  currentTab = id;
  const errEl = document.getElementById(id+'-err');
  errEl.style.display = 'none';

  let empty = false;
  if (id === 'se') {
    const activity = document.getElementById('se-activity').value.trim();
    const memo     = document.getElementById('se-memo').value.trim();
    empty = !activity && !memo;
  } else {
    empty = !document.getElementById(id+'-memo').value.trim();
  }
  if (empty) {
    errEl.textContent = id==='se'
      ? '수업 활동 내용 또는 학생 특이사항을 입력해 주세요.'
      : '관찰 메모를 입력해 주세요.';
    errEl.style.display='block';
    return;
  }

  state.lastMsg = buildUserMsg();
  state.result  = '';
  state.pendingMods = {};
  updateApplyBtn();
  setLoading(true, id);

  try {
    showResult(
      await callAPI([{ role:'user', content:state.lastMsg }], MODELS.haiku),
      MODELS.haiku
    );
  } catch(e) {
    errEl.textContent = '⚠️ ' + e.message;
    errEl.style.display = 'block';
  }
  setLoading(false, id);
}

/* ────────────────────────────────
   수정 후속 호출
──────────────────────────────── */
const MOD_SYSTEM = `학생부 특기사항 수정 전문가입니다.
- 주어진 텍스트를 요청에 맞게 수정
- 모든 문장은 '~함.'으로 마무리
- 입력된 내용에 없는 사실은 추가하지 않음
- 수정된 결과만 출력 (설명·제목 없이)
- 글자 수 지정 시 ±20자 이내로 맞출 것`;

async function followUp(msg) {
  setLoading(true, currentTab);
  ['chars-modal','comp-modal','ep-modal'].forEach(id=>{
    document.getElementById(id).style.display='none';
  });
  try {
    const userMsg = `현재 작성된 내용:\n${state.result}\n\n요청: ${msg}`;
    showResult(
      await callAPI([
        { role:'user', content:userMsg }
      ], MODELS.haiku, MOD_SYSTEM),
      MODELS.haiku
    );
  } catch(e) {
    const errEl = document.getElementById(currentTab+'-err');
    errEl.textContent='⚠️ ' + e.message;
    errEl.style.display='block';
  }
  setLoading(false, currentTab);
}

function reGenerate() {
  followUp('처음부터 다시 작성해줘. 메모에 없는 내용은 추가하지 마.');
}

}

/* ────────────────────────────────
   수정사항 모아서 1회 호출
──────────────────────────────── */
function onAdjCharsChange(val) {
  document.getElementById('adj-chars-display').textContent = val+'자';
  state.pendingMods.chars = val;
  updateApplyBtn();
}

function toggleCompTag(btn) {
  btn.classList.toggle('selected');
  const selected = Array.from(document.querySelectorAll('#comp-modal .tag-btn.selected'))
    .map(b => b.textContent);
  if (selected.length > 0) {
    state.pendingMods.comps = selected;
  } else {
    delete state.pendingMods.comps;
  }
  updateApplyBtn();
}

function onEpisodeChange(val) {
  if (val.trim()) {
    state.pendingMods.episode = val.trim();
  } else {
    delete state.pendingMods.episode;
  }
  updateApplyBtn();
}

function updateApplyBtn() {
  const has = Object.keys(state.pendingMods).length > 0;
  document.getElementById('apply-btn').style.display = has ? 'block' : 'none';
}

function buildApplyMessage() {
  const parts = [];
  if (state.pendingMods.chars) {
    parts.push(`${state.pendingMods.chars}자로 분량을 조정해줘.`);
  }
  if (state.pendingMods.comps && state.pendingMods.comps.length > 0) {
    parts.push(`${state.pendingMods.comps.join(', ')}을(를) 더 부각해줘.`);
  }
  if (state.pendingMods.episode) {
    parts.push(`다음 내용도 반영해줘: ${state.pendingMods.episode}`);
  }
  return parts.join(' ') + ' 단, 메모에 없는 내용은 추가하지 마.';
}

function applyMods() {
  const msg = buildApplyMessage();
  document.querySelectorAll('#comp-modal .tag-btn.selected').forEach(btn=>{
    btn.classList.remove('selected');
  });
  document.getElementById('ep-input').value = '';
  state.pendingMods = {};
  updateApplyBtn();
  followUp(msg);
}

/* ────────────────────────────────
   결과 표시
──────────────────────────────── */
function showResult(text, model) {
  state.result = text;
  const isQ = text.trim().startsWith('❓');
  const isW = text.trim().startsWith('⚠️');
  const tc = TABS.find(t=>t.id===currentTab).color;
  const card = document.getElementById('result-card');

  const modelBadge = document.getElementById('model-badge');
  if (model === MODELS.haiku) {
    modelBadge.textContent = 'Haiku · 초안';
    modelBadge.style.background = '#e8f5e9'; modelBadge.style.color = '#2e7d32';
  } else {
    modelBadge.textContent = 'Sonnet · 수정본';
    modelBadge.style.background = '#e3f2fd'; modelBadge.style.color = '#1565c0';
  }

  if (isQ) {
    document.getElementById('result-label').textContent='추가 정보 필요';
    document.getElementById('char-display').textContent='';
    document.getElementById('result-text').textContent=text.trim();
    document.getElementById('competencies').textContent='';
    document.getElementById('copy-btn').style.display='none';
    card.className='result-card q-card';
    document.getElementById('opts-sec').style.display='none';
    document.getElementById('save-bar').style.display='none';
    document.getElementById('apply-btn').style.display='none';
    const writeWrap = document.getElementById('write-anyway-wrap');
    writeWrap.style.display = 'block';
    const writeBtn = document.getElementById('write-anyway-btn');
    writeBtn.style.background = tc;
    writeBtn.textContent = '✍️ 내용이 부족하지만 바로 작성하기';
  } else if (isW) {
    document.getElementById('result-label').textContent='내용 보완 권장';
    document.getElementById('char-display').textContent='';
    document.getElementById('result-text').textContent=text.trim();
    document.getElementById('competencies').textContent='';
    document.getElementById('copy-btn').style.display='none';
    card.className='result-card w-card';
    document.getElementById('opts-sec').style.display='none';
    document.getElementById('save-bar').style.display='none';
    document.getElementById('apply-btn').style.display='none';
    const writeWrap = document.getElementById('write-anyway-wrap');
    writeWrap.style.display = 'block';
    const writeBtn = document.getElementById('write-anyway-btn');
    writeBtn.style.background = '#d97706';
    writeBtn.textContent = '✍️ 지금 그대로 작성하기';
  } else {
    document.getElementById('write-anyway-wrap').style.display = 'none';
    document.getElementById('result-text').textContent=text.split('📝')[0].trim();
    const titles={
      se:`[${(document.getElementById('se-subject')||{}).value||'과목'}] 교과세부능력 및 특기사항`,
      ja:'자율활동 특기사항', do:'동아리활동 특기사항',
      ji:'진로활동 특기사항', hb:'행동특성 및 종합의견'
    };
    document.getElementById('result-label').textContent=titles[currentTab];
    const cm=text.match(/📝\s*글자\s*수[:\s]+(\d+)/);
    const badge=document.getElementById('char-display');
    badge.textContent=cm?`📝 ${cm[1]}자`:'';
    badge.style.background=tc+'22'; badge.style.color=tc;
    const comp=text.match(/💡\s*반영된\s*역량[:\s]+([^\n]+)/);
    document.getElementById('competencies').textContent=comp?`💡 반영된 역량: ${comp[1].trim()}`:'';
    document.getElementById('copy-btn').style.display='';
    card.className='result-card';
    document.getElementById('opts-sec').style.display='';
  }
  document.getElementById('result-wrap').style.display='block';
  if (!isQ) refreshSaveBar();
  document.getElementById('result-wrap').scrollIntoView({behavior:'smooth',block:'start'});
}

/* ────────────────────────────────
   로딩
──────────────────────────────── */
function setLoading(on, id) {
  document.getElementById('loading').style.display=on?'block':'none';
  document.getElementById('loading-msg').textContent=`${LABELS[id]}을(를) 작성하고 있습니다...`;
  document.getElementById(id+'-gen-btn').disabled=on;
  if (on) document.getElementById('result-wrap').style.display='none';
}

/* ────────────────────────────────
   서브 모달 토글
──────────────────────────────── */
function toggleSub(id) {
  ['chars-modal','comp-modal','ep-modal'].forEach(mid=>{
    document.getElementById(mid).style.display=
      (mid===id && document.getElementById(mid).style.display==='none')?'block':'none';
  });
}

/* ────────────────────────────────
   복사
──────────────────────────────── */
function copyResult(btn) {
  navigator.clipboard.writeText(document.getElementById('result-text').textContent).then(()=>{
    btn.textContent='✓ 복사됨';
    setTimeout(()=>{ btn.textContent='복사'; },2000);
  });
}
</script>
